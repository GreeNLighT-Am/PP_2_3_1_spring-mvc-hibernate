<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Users</title>
    <style>
        /* Стили для таблицы */
        table {
            width: 50%;
            border-collapse: collapse; /* Убирает двойные границы */
            margin: 20px 0;
            font-family: Arial, sans-serif;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
        }

        th {
            background-color: #f2f2f2; /* Цвет фона для заголовков */
            font-weight: bold;
        }

        tr:nth-child(even) {
            background-color: #f9f9f9; /* Чередующийся цвет строк */
        }

        tr:hover {
            background-color: #f1f1f1; /* Цвет строки при наведении */
        }
    </style>
</head>
<body>

<!-- Вывод сообщения об ошибке, если оно есть -->
<div th:if="${error}" style="color: red; margin-bottom: 10px;">
    <p th:text="${error}"></p>
</div>

<a th:href="@{/users/new}">Добавить нового пользователя</a>
<!-- Таблица отображается только если нет ошибки -->
<div th:if="${error == null}">
    <h1>Список пользователей</h1>
    <table>
        <thead>
        <tr>
            <th>id</th>
            <th>Имя</th>
            <th>Возраст</th>
            <th>email</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="user : ${users}" style="cursor: pointer;" th:onclick="|window.location.href='@{/users(id=${user.id})}'|">
            <td th:text="${user.id}"></td>
            <td th:text="${user.name}"></td>
            <td th:text="${user.age}"></td>
            <td th:text="${user.email}"></td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
