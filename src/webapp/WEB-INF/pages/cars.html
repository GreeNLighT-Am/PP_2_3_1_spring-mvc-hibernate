<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title></title>
    <style>
        /* Стили для таблицы */
        table {
            width: 50%;
            border-collapse: collapse; /* Убирает двойные границы */
            margin: 20px 0;
            font-family: Arial, sans-serif;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
        }

        th {
            background-color: #f2f2f2; /* Цвет фона для заголовков */
            font-weight: bold;
        }

        tr:nth-child(even) {
            background-color: #f9f9f9; /* Чередующийся цвет строк */
        }

        tr:hover {
            background-color: #f1f1f1; /* Цвет строки при наведении */
        }
    </style>
</head>
<body>

<!-- Вывод сообщения об ошибке, если оно есть -->
<div th:if="${error}" style="color: red; margin-bottom: 10px;">
    <p th:text="${error}"></p>
</div>

<!-- Таблица отображается только если нет ошибки -->
<div th:if="${error == null}">
    <h1>Список машин</h1>
    <table>
        <thead>
        <tr>
            <th>Модель</th>
            <th>Серия</th>
            <th>Цвет</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="car : ${cars}">
            <td th:text="${car.model}"></td>
            <td th:text="${car.series}"></td>
            <td th:text="${car.color}"></td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
